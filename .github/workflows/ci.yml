name: CI (Qt qmake build)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Qt + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qt5-qmake \
            qtbase5-dev \
            qtbase5-dev-tools \
            qttools5-dev-tools \
            libqt5sql5-sqlite

      - name: Build with qmake
        run: |
          qmake Campus.pro
          make -j"$(nproc)"
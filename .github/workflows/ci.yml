name: CI (Qt qmake build)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qt5-qmake \
            qtbase5-dev \
            qtbase5-dev-tools \
            qttools5-dev-tools \
            libqt5sql5-sqlite \
            qtdeclarative5-dev \
            qml-module-qtquick2 \
            qml-module-qtquick-controls2 \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libxcb-xinerama0-dev

      - name: Build project
        run: |
          qmake Campus.pro
          make -j$(nproc)
